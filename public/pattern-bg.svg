<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">

  <!-- Row 1 -->

  <!-- Ruble sign ₽ -->
  <g transform="translate(30, 30)">
    <path d="M8 4h6a6 6 0 0 1 0 12H8V4z"/>
    <line x1="6" y1="16" x2="18" y2="16"/>
    <line x1="8" y1="4" x2="8" y2="24"/>
    <line x1="5" y1="20" x2="14" y2="20"/>
  </g>

  <!-- Cloud (INNO Clouds) -->
  <g transform="translate(120, 25)">
    <path d="M6 20a4 4 0 0 1-.9-7.9 8 8 0 0 1 15.8 2A5 5 0 0 1 25 20H6z"/>
    <text x="10" y="17" font-size="6" font-family="system-ui" font-weight="700" fill="white" stroke="none" text-anchor="middle" transform="translate(5.5,0)">i</text>
  </g>

  <!-- Coin / money -->
  <g transform="translate(215, 28)">
    <circle cx="12" cy="12" r="10"/>
    <text x="12" y="16" font-size="12" font-family="system-ui" font-weight="600" fill="white" stroke="none" text-anchor="middle">₽</text>
  </g>

  <!-- Row 2 -->

  <!-- Bar chart (BONDA BI) -->
  <g transform="translate(70, 105)">
    <rect x="2" y="12" width="5" height="12" rx="1"/>
    <rect x="10" y="6" width="5" height="18" rx="1"/>
    <rect x="18" y="0" width="5" height="24" rx="1"/>
    <line x1="0" y1="24" x2="26" y2="24"/>
  </g>

  <!-- Banknote -->
  <g transform="translate(165, 100)">
    <rect x="0" y="2" width="28" height="18" rx="3"/>
    <circle cx="14" cy="11" r="5"/>
    <text x="14" y="14" font-size="8" font-family="system-ui" font-weight="600" fill="white" stroke="none" text-anchor="middle">₽</text>
  </g>

  <!-- Trending up arrow -->
  <g transform="translate(270, 105)">
    <polyline points="2 20 10 12 16 16 26 4"/>
    <polyline points="18 4 26 4 26 12"/>
  </g>

  <!-- Row 3 -->

  <!-- Wallet -->
  <g transform="translate(20, 185)">
    <rect x="2" y="6" width="22" height="16" rx="3"/>
    <path d="M2 6a4 4 0 0 1 4-4h12a4 4 0 0 1 4 4"/>
    <circle cx="19" cy="14" r="2"/>
  </g>

  <!-- Pie chart (INNO deal mix) -->
  <g transform="translate(120, 180)">
    <circle cx="12" cy="12" r="11"/>
    <path d="M12 1a11 11 0 0 1 9.5 5.5L12 12V1z"/>
    <path d="M12 12L21.5 6.5A11 11 0 0 1 23 12H12z"/>
  </g>

  <!-- Dollar/currency stack -->
  <g transform="translate(220, 182)">
    <ellipse cx="12" cy="18" rx="10" ry="4"/>
    <ellipse cx="12" cy="14" rx="10" ry="4"/>
    <ellipse cx="12" cy="10" rx="10" ry="4"/>
    <ellipse cx="12" cy="6" rx="10" ry="4"/>
  </g>

  <!-- Row 4 -->

  <!-- Target/plan -->
  <g transform="translate(65, 260)">
    <circle cx="12" cy="12" r="10"/>
    <circle cx="12" cy="12" r="6"/>
    <circle cx="12" cy="12" r="2"/>
  </g>

  <!-- Cloud with arrow (INNO implementation) -->
  <g transform="translate(160, 255)">
    <path d="M4 20a4 4 0 0 1-.7-7.9 7.5 7.5 0 0 1 14.9 1.9A4.5 4.5 0 0 1 22 20H4z"/>
    <polyline points="9 15 13 11 17 15"/>
    <line x1="13" y1="11" x2="13" y2="20"/>
  </g>

  <!-- Handshake / deal -->
  <g transform="translate(260, 260)">
    <path d="M2 14l6-6 4 2 6-4"/>
    <path d="M22 10l-4 4-3-2-5 5"/>
    <path d="M4 20c2-1 4-2 6-1s4 2 6 1"/>
  </g>

</svg>
